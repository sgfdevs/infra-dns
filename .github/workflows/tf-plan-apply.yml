name: Terraform Plan and Apply

on:
  push:
    branches:
      - main
    paths:
      - src/tf/**
      - .github/workflows/tf-plan-apply.yml
  workflow_dispatch:
    inputs:
      plan-only:
        description: Run plan only (skip apply)
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  validate:
    uses: glitchedmob/infra-gha/.github/workflows/tf-validate.yml@v0.7.1
    with:
      init-backend: false

  plan_apply:
    needs: validate
    uses: glitchedmob/infra-gha/.github/workflows/tf-plan-apply.yml@v0.7.1
    with:
      plan-only: ${{ github.event_name == 'workflow_dispatch' && inputs.plan-only || false }}
    secrets:
      envrc_content: |
        export TF_VAR_cloudflare_api_token="${{ secrets.TF_VAR_cloudflare_api_token }}"
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
      output_encryption_key: ${{ secrets.OUTPUT_ENCRYPTION_KEY }}
